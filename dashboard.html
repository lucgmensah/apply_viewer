<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suivi de Candidatures - Tableau de Bord</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <div class="header-left">
      <div class="brand-capsule">Apply View</div>

        <span class="nav-item">Candidatures</span>
        <span class="nav-item">Entretiens</span>
        <span class="nav-item">Statistiques</span>
      </nav> -->
    </div>
    
    <div class="header-right">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20">
          <path fill="currentColor" d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
        <input type="text" id="search-input" placeholder="Rechercher...">
      </div>
      
      <button id="btn-export" class="btn btn-outline" title="Exporter vers Excel (CSV)">
        Exporter Excel
      </button>
      
      <button id="btn-add" class="btn btn-solid">
        Nouvelle Candidature
      </button>
      
      <!-- <button class="btn-settings-icon" title="Paramètres">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path fill="currentColor" d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>

      </button> -->
      
      <!-- <div class="user-avatar" title="Sophie Martin">SM</div> -->
    </div>
  </header>

  <main class="app-content">
    
    <!-- STATS OVERVIEW & GREETING -->
    <div class="welcome-section">
      <div class="welcome-left">
        <h1 class="welcome-title">Welcome in your job board,</h1>
        <div class="welcome-pills">
          <div class="stat-card metric-pill active" data-filter="wishlist">
            <span>À postuler</span>
            <span class="pill-percentage" id="stat-wishlist">0</span>
          </div>
          <div class="stat-card metric-pill yellow" data-filter="offer">
            <span>Offres</span>
            <span class="pill-percentage" id="stat-offer">0</span>
          </div>
          <div class="stat-card metric-pill outline" data-filter="rejected">
            <span>Refusées</span>
            <span class="pill-percentage" id="stat-rejected">0</span>
          </div>
        </div>
      </div>
      
      <div class="welcome-right-stats">
        <div class="stat-card metric-number-card" data-filter="all">
          <div class="metric-number-val">
            <svg viewBox="0 0 24 24" width="20" height="20" class="metric-icon"><path fill="currentColor" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            <span id="stat-total">0</span>
          </div>
          <span class="metric-number-label">Total candidatures</span>
        </div>
        <div class="stat-card metric-number-card" data-filter="applied">
          <div class="metric-number-val">
            <svg viewBox="0 0 24 24" width="20" height="20" class="metric-icon"><path fill="currentColor" d="M22 13h-8v-2h8v2zm0-6h-8v2h8V7zm0 12h-8v2h8v-2zm-10-8v2H2v-2h10zm0-6v2H2V5h10zm0 12v2H2v-2h10z"/></svg>
            <span id="stat-applied">0</span>
          </div>
          <span class="metric-number-label">Envoyées</span>
        </div>
        <div class="stat-card metric-number-card" data-filter="interview">
          <div class="metric-number-val">
            <svg viewBox="0 0 24 24" width="20" height="20" class="metric-icon"><path fill="currentColor" d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
            <span id="stat-interview">0</span>
          </div>
          <span class="metric-number-label">Entretiens</span>
        </div>
      </div>
    </div>

    <!-- KANBAN BOARD -->
    <section class="kanban-board">
      
      <!-- COLUMN: WISHLIST -->
      <div class="kanban-column" id="col-wishlist" data-status="wishlist">
        <div class="column-header">
          <h2>À postuler</h2>
          <span class="column-count" id="count-wishlist">0</span>
        </div>
        <div class="column-cards" id="cards-wishlist"></div>
      </div>

      <!-- COLUMN: APPLIED -->
      <div class="kanban-column" id="col-applied" data-status="applied">
        <div class="column-header">
          <h2>Envoyées</h2>
          <span class="column-count" id="count-applied">0</span>
        </div>
        <div class="column-cards" id="cards-applied"></div>
      </div>

      <!-- COLUMN: INTERVIEW -->
      <div class="kanban-column" id="col-interview" data-status="interview">
        <div class="column-header">
          <h2>Entretiens</h2>
          <span class="column-count" id="count-interview">0</span>
        </div>
        <div class="column-cards" id="cards-interview"></div>
      </div>

      <!-- COLUMN: OFFER -->
      <div class="kanban-column" id="col-offer" data-status="offer">
        <div class="column-header">
          <h2>Offres Reçues</h2>
          <span class="column-count" id="count-offer">0</span>
        </div>
        <div class="column-cards" id="cards-offer"></div>
      </div>

      <!-- COLUMN: REJECTED -->
      <div class="kanban-column" id="col-rejected" data-status="rejected">
        <div class="column-header">
          <h2>Refusées / Classées</h2>
          <span class="column-count" id="count-rejected">0</span>
        </div>
        <div class="column-cards" id="cards-rejected"></div>
      </div>

    </section>
  </main>

  <!-- MODAL: ADD / EDIT CANDIDATURE -->
  <div class="modal-overlay" id="candidature-modal">
    <div class="modal-container">
      <div class="modal-header">
        <h2 id="modal-title">Nouvelle Candidature</h2>
        <button id="modal-close" class="btn-close" aria-label="Fermer">
          <svg viewBox="0 0 24 24" width="24" height="24">
            <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
          </svg>
        </button>
      </div>
      
      <form id="candidature-form">
        <input type="hidden" id="field-id">
        
        <div class="form-row">
          <div class="form-group">
            <label for="field-title">Poste *</label>
            <input type="text" id="field-title" required placeholder="ex: Développeur Front-End">
          </div>
          <div class="form-group">
            <label for="field-company">Entreprise *</label>
            <input type="text" id="field-company" required placeholder="ex: Google">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="field-status">Statut de la candidature</label>
            <select id="field-status">
              <option value="wishlist">À postuler</option>
              <option value="applied">Candidature envoyée</option>
              <option value="interview">Entretien en cours</option>
              <option value="offer">Offre reçue</option>
              <option value="rejected">Refusée / Classée</option>
            </select>
          </div>
          <div class="form-group">
            <label for="field-date">Date de l'action / envoi</label>
            <input type="date" id="field-date">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="field-location">Lieu</label>
            <input type="text" id="field-location" placeholder="ex: Paris, Télétravail, Hybride">
          </div>
          <div class="form-group">
            <label for="field-salary">Salaire / Rémunération</label>
            <input type="text" id="field-salary" placeholder="ex: 45k€, 3500€/mois">
          </div>
        </div>

        <div class="form-group">
          <label for="field-url">Lien de l'offre d'emploi</label>
          <input type="url" id="field-url" placeholder="https://www.linkedin.com/jobs/...">
        </div>

        <hr class="form-separator">

        <h3 class="section-title">Contact Recruteur</h3>
        <div class="form-row">
          <div class="form-group">
            <label for="field-contact-name">Nom du contact</label>
            <input type="text" id="field-contact-name" placeholder="ex: Sophie Martin">
          </div>
          <div class="form-group">
            <label for="field-contact-email">Email</label>
            <input type="email" id="field-contact-email" placeholder="contact@entreprise.com">
          </div>
          <div class="form-group">
            <label for="field-contact-phone">Téléphone</label>
            <input type="tel" id="field-contact-phone" placeholder="06 12 34 56 78">
          </div>
        </div>

        <hr class="form-separator">

        <div class="form-group">
          <label for="field-notes">Notes de suivi & Historique des entretiens</label>
          <textarea id="field-notes" rows="4" placeholder="Ajouter des notes, questions préparées, dates de relance..."></textarea>
        </div>

        <div class="form-actions">
          <button type="button" id="btn-delete" class="btn btn-danger hidden">
            <svg class="btn-icon" viewBox="0 0 24 24" width="18" height="18">
              <path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
            </svg>
            Supprimer
          </button>
          <div class="actions-right">
            <button type="button" id="btn-cancel" class="btn btn-outline">Annuler</button>
            <button type="submit" id="btn-save" class="btn btn-solid">Enregistrer</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
